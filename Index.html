*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0c0c0f;
  --surface:   #13131a;
  --gold:      #c9a84c;
  --gold-dim:  #7a6230;
  --text:      #e8e0d0;
  --text-dim:  #6e6860;
  --radius:    var(--card-radius, 16px);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  padding: 2rem;
}

#deck-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 0.3em;
  color: var(--gold-dim);
  text-transform: uppercase;
}

/* ── Card ── */
.scene {
  perspective: 1200px;
}

.card {
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
  cursor: pointer;
}

.card.revealed {
  transform: rotateY(180deg);
  cursor: default;
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  overflow: hidden;
}

.card-back  { transform: rotateY(0deg); }
.card-front { transform: rotateY(180deg); }

.card-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* round shape override */
.shape-round .card-face {
  border-radius: 50%;
}

/* ── Controls ── */
#controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

#card-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  letter-spacing: 0.2em;
  color: var(--gold);
  min-height: 1.4em;
  opacity: 0;
  transition: opacity 0.6s ease 0.4s;
}

#card-title.visible { opacity: 1; }

button {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.6rem 1.8rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

button:hover {
  border-color: var(--gold);
  color: var(--text);
}

#hint {
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  font-style: italic;
}

.hidden { display: none; }

<body>

  <div id="deck-name">—</div>

  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="card-face card-back">
        <img id="img-back" src="" alt="Card back" />
      </div>
      <div class="card-face card-front">
        <img id="img-front" src="" alt="Card front" />
      </div>
    </div>
  </div>

  <div id="controls">
    <div id="card-title"></div>
    <p id="hint">touch to reveal</p>
    <button id="btn-draw" class="hidden">Draw Another</button>
  </div>

  <script>
    let deck = [];
    let current = null;
    let revealed = false;

    const card      = document.getElementById('card');
    const imgBack   = document.getElementById('img-back');
    const imgFront  = document.getElementById('img-front');
    const cardTitle = document.getElementById('card-title');
    const btnDraw   = document.getElementById('btn-draw');
    const hint      = document.getElementById('hint');
    const deckName  = document.getElementById('deck-name');
    const scene     = document.getElementById('scene');

    async function init() {
      const config = await fetch('./deck.config.json').then(r => r.json());

      // Apply config
      deckName.textContent = config.name || 'Oracle';
      document.title = config.name || 'Oracle';

      // Card sizing
      const w = config.cardWidth  || 260;
      const h = config.cardHeight || 450;
      const r = config.cardRadius ?? 16;
      scene.style.width  = w + 'px';
      scene.style.height = h + 'px';
      card.style.width   = w + 'px';
      card.style.height  = h + 'px';
      document.documentElement.style.setProperty('--card-radius', r + 'px');

      // Shape class
      if (config.cardShape === 'round') card.classList.add('shape-round');

      // Card back
      imgBack.src = config.cardBack || './card-back.png';

      deck = shuffle([...config.cards]);
      draw();
    }

    function draw() {
      if (!deck.length) deck = shuffle([...currentDeck]);
      current  = deck.pop();
      revealed = false;

      imgFront.src = current.image;
      card.classList.remove('revealed');
      cardTitle.textContent = '';
      cardTitle.classList.remove('visible');
      hint.textContent = 'touch to reveal';
      btnDraw.classList.add('hidden');
    }

    function reveal() {
      if (revealed) return;
      revealed = true;
      card.classList.add('revealed');
      cardTitle.textContent = current.title || '';
      cardTitle.classList.add('visible');
      hint.textContent = '';
      btnDraw.classList.remove('hidden');
    }

    card.addEventListener('click', () => { if (!revealed) reveal(); });
    btnDraw.addEventListener('click', draw);

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // keep reference for reshuffle
    let currentDeck = [];
    const _init = init;
    init = async function() {
      await _init();
      const config = await fetch('./deck.config.json').then(r => r.json());
      currentDeck = config.cards;
    };

    init();
  </script>

</body>
</html>
